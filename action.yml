name: "openvpn-github-action"
description: "connect to OpenVPN server"
branding:
  icon: "lock"
  color: "green"
inputs:
  config_file:
    description: "Location of OpenVPN client config file"
    required: true
  hostname:
    description: "Remote hostname"
    required: true
  port:
    description: "Remote port"
    required: true
  ca:
    description: "CA certificate"
    required: false
  cert:
    description: "Client certificate"
    required: false
  username:
    description: "Username"
    required: false
  password:
    description: "Password"
    required: false
  askpass:
    description: "Passphrase for the client certificate"
    required: false
  tls_auth_key:
    description: "Pre-shared group key for TLS Auth"
    required: false
  tls_crypt_key:
    description: "Pre-shared group key for TLS Crypt"
    required: false    
  tls_crypt_v2_key:
    description: "Per-client key for TLS Crypt V2"
    required: false
  client_key:
    description: "Local peer's private key"
    required: false
  echo_config:
    description: "Print the OpenVPN configuration file"
    required: false
    default: "true"
runs:
  using: "node24"
  main: "dist/index.js"
  post: "dist/index.js"
